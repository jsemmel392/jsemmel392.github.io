<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hide in Picture — Key Gen</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .center-header {
        text-align: center;
        display: block;
        width: 100%;
    }

    /* Yellow Branding for the Button - High Visibility Stealth */
    .gen-btn { 
        display: inline-block;
        margin-top: 15px;
        padding: 12px 35px; 
        cursor: pointer; 
        border: 1px solid #ffd60a; 
        border-radius: 6px;
        background: #1a1a00; 
        color: #ffd60a; 
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        font-size: 0.85rem;
        transition: all 0.3s ease;
    }

    .gen-btn:hover { 
        background: #ffd60a;
        color: #000;
        box-shadow: 0 0 15px rgba(255, 214, 10, 0.4);
    }

    #key-display { 
        margin: 20px 0; 
        padding: 20px; 
        background: #080808; 
        border: 1px solid #2a2a2a;
        border-radius: 8px; 
        font-family: 'Consolas', monospace; 
        font-size: 1.2rem; 
        color: #ffffff; 
        min-height: 1.5em;
        text-align: center;
    }

    input[type="number"] {
        background: #000;
        border: 1px solid #333;
        color: #ffd60a;
        padding: 5px;
        border-radius: 4px;
        width: 60px;
        text-align: center;
        font-weight: bold;
    }

    .label-text {
        font-size: 0.8rem; 
        color: #555;
        letter-spacing: 1px;
    }

    /* Streamlined Footer */
    footer {
      margin-top: 80px;
      padding-top: 24px;
      border-top: 1px solid #2a2a2a;
      font-size: 0.85rem;
      color: #555;
      text-align: center;
    }

    footer a {
      color: #888;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
      color: #a0c4ff;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Hide in Picture</h1>
    <span class="subtitle">Secure Key Generator</span>

    <div class="project-link">
      <span class="app-title center-header">Key Management</span>
      <p class="app-desc center-header">Generate a high-entropy security key for AES-256 encryption.</p>
      
      <div style="text-align: center; margin-top: 25px;">
        <span class="label-text">KEY LENGTH:</span>
        <input type="number" id="length" value="16" min="8" max="128">
        
        <div id="key-display">••••••••••••••••</div>
        
        <button class="gen-btn" onclick="generateKey()">Generate & Copy</button>
      </div>
    </div>

    <footer>
      &copy; 2026 Modern HIP &mdash; <a href="https://semmel.us">semmel.us</a> &mdash; Last updated: March 18, 2026
    </footer>
  </div>

  <script>
    function generateKey() {
        const lenInput = document.getElementById('length');
        const length = parseInt(lenInput.value) || 16;
        
        // Universal set: No ambiguous characters (0, O, I, l)
        const charset = "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789!@#$%^*-_=+";
        let retVal = "";
        
        const randomValues = new Uint32Array(length);
        window.crypto.getRandomValues(randomValues);

        for (let i = 0; i < length; ++i) {
            retVal += charset.charAt(randomValues[i] % charset.length);
        }

        const display = document.getElementById('key-display');
        display.innerText = retVal;
        
        // Border flash for confirmation
        display.style.borderColor = "#ffd60a";
        setTimeout(() => { display.style.borderColor = "#2a2a2a"; }, 300);

        navigator.clipboard.writeText(retVal);
    }
  </script>
</body>
</html>
