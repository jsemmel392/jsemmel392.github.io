<!-- name_matrix.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Name Matrix</title>
<style>
  :root{
    --bg:#0d0c08;
    --bg-panel:#161309;
    --amber:#ffb000;
    --amber-dim:#8a5a00;
    --amber-faint:#4a3a1a;
    --cyan:#4fd8c4;
    --text:#e8dcc0;
    --line-glow: 0 0 6px currentColor;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'JetBrains Mono','IBM Plex Mono',ui-monospace,monospace;
    min-height:100%;
  }
  body{
    padding:32px 20px 60px;
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(255,176,0,0.05), transparent 60%);
  }
  .wrap{
    max-width:920px;
    margin:0 auto;
  }
  h1{
    font-size:15px;
    letter-spacing:0.25em;
    text-transform:uppercase;
    color:var(--amber);
    text-shadow:var(--line-glow);
    margin:0 0 4px;
    font-weight:600;
  }
  .sub{
    font-size:12px;
    color:var(--amber-dim);
    margin:0 0 8px;
    letter-spacing:0.05em;
  }
  .credit{
    font-size:11px;
    color:var(--amber-faint);
    margin:0 0 28px;
    letter-spacing:0.02em;
    font-style:italic;
  }
  .credit-book{
    color:var(--amber-dim);
    font-style:normal;
  }
  .input-row{
    display:flex;
    gap:10px;
    margin-bottom:28px;
    border:1px solid var(--amber-faint);
    background:var(--bg-panel);
    padding:14px 16px;
  }
  .input-row label{
    color:var(--amber-dim);
    font-size:12px;
    align-self:center;
    letter-spacing:0.1em;
  }
  .input-row input{
    flex:1;
    background:transparent;
    border:none;
    border-bottom:1px solid var(--amber-dim);
    color:var(--amber);
    font-family:inherit;
    font-size:16px;
    padding:6px 4px;
    letter-spacing:0.03em;
  }
  .input-row input:focus{
    outline:none;
    border-bottom-color:var(--amber);
  }
  .input-row button{
    background:var(--amber-faint);
    border:1px solid var(--amber-dim);
    color:var(--amber);
    font-family:inherit;
    font-size:12px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    padding:0 18px;
    cursor:pointer;
  }
  .input-row button:hover{
    background:var(--amber-dim);
    color:#000;
  }
  .layout{
    display:grid;
    grid-template-columns:1fr 300px;
    gap:24px;
  }
  @media (max-width:760px){
    .layout{grid-template-columns:1fr;}
  }
  .panel{
    border:1px solid var(--amber-faint);
    background:var(--bg-panel);
    padding:18px;
  }
  .panel h2{
    font-size:11px;
    letter-spacing:0.15em;
    text-transform:uppercase;
    color:var(--amber-dim);
    margin:0 0 14px;
    font-weight:600;
  }
  svg{width:100%;height:auto;display:block;}
  .cell-label{
    font-size:11px;
    fill:var(--amber-dim);
    letter-spacing:0.05em;
  }
  .cell-digit{
    font-size:20px;
    fill:var(--amber);
    font-weight:700;
  }
  .cell-count{
    font-size:10px;
    fill:var(--cyan);
  }
  table{
    width:100%;
    border-collapse:collapse;
    font-size:12px;
  }
  td{
    padding:5px 4px;
    border-bottom:1px solid var(--amber-faint);
  }
  td.group{color:var(--amber-dim);}
  td.count{color:var(--amber);text-align:right;font-weight:700;}
  .status{
    margin-top:16px;
    font-size:12px;
    padding:10px 12px;
    border:1px solid var(--amber-faint);
  }
  .status.complete{color:var(--cyan);border-color:var(--cyan);}
  .status.gaps{color:var(--amber);}
  .gap-list{color:var(--amber-dim);}
</style>
</head>
<body>
<div class="wrap">
  <h1>Name Matrix</h1>
  <p class="sub">Pythagorean name psychomatrix &mdash; A=1..I=9, J=1..R=9, S=1..Z=8</p>
  <p class="credit">Methodology adapted from Alexander F. Aleksandrov's digital analysis system, <span class="credit-book">"Secrets of Magic Numbers"</span> (Тайны магических цифр).</p>

  <div class="input-row">
    <label for="nameInput">NAME</label>
    <input id="nameInput" type="text" placeholder="Enter any full name" autocomplete="off" spellcheck="false">
    <button id="processBtn">Process</button>
    <button id="clearBtn">Clear</button>
  </div>

  <div class="layout">
    <div class="panel">
      <h2>Grid</h2>
      <svg id="gridSvg" viewBox="0 0 400 400"></svg>
    </div>
    <div class="panel">
      <h2>Letter Groups</h2>
      <table id="groupTable"></table>
      <div id="statusBox" class="status"></div>
    </div>
  </div>
</div>

<script>
const GROUPS = [
  ["A, J, S", 1],
  ["B, K, T", 2],
  ["C, L, U", 3],
  ["D, M, V", 4],
  ["E, N, W", 5],
  ["F, O, X", 6],
  ["G, P, Y", 7],
  ["H, Q, Z", 8],
  ["I, R", 9],
];

// Grid layout matches the original VB6 tool:
// row1 (top):    3  6  9
// row2 (middle): 2  5  8
// row3 (bottom): 1  4  7
const POSITIONS = {
  3: [70, 70],   6: [200, 70],   9: [330, 70],
  2: [70, 200],  5: [200, 200],  8: [330, 200],
  1: [70, 330],  4: [200, 330],  7: [330, 330],
};

// Standard psychomatrix lines: 3 rows, 3 columns, 2 diagonals
const LINES = [
  { cells:[3,6,9], color:"#c04fd8" }, // top row
  { cells:[2,5,8], color:"#4fd8c4" }, // middle row
  { cells:[1,4,7], color:"#d84f4f" }, // bottom row
  { cells:[3,2,1], color:"#4fd85a" }, // left column
  { cells:[6,5,4], color:"#d8c74f" }, // middle column
  { cells:[9,8,7], color:"#4f6ad8" }, // right column
  { cells:[3,5,7], color:"#7a4f2a" }, // diagonal
  { cells:[9,5,1], color:"#2a2a2a" }, // diagonal
];

function letterToDigit(ch){
  const c = ch.toUpperCase();
  if (c < 'A' || c > 'Z') return null;
  const pos = c.charCodeAt(0) - 65; // 0-25
  return (pos % 9) + 1;
}

function countDigits(name){
  const counts = new Array(10).fill(0);
  for (const ch of name){
    const d = letterToDigit(ch);
    if (d !== null) counts[d]++;
  }
  return counts;
}

function svgLine(x1,y1,x2,y2,color,weight){
  return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${color}" stroke-width="${weight}" opacity="0.65"/>`;
}

function svgRings(cx, cy, count){
  // concentric rings scale with frequency, echoing the VB6 tool
  let out = "";
  const n = Math.min(count, 6);
  for (let i = 0; i < n; i++){
    const r = 14 + i * 6;
    out += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--amber-dim)" stroke-width="1" opacity="${0.8 - i*0.1}"/>`;
  }
  return out;
}

function render(name){
  const counts = countDigits(name);

  // lines: only draw a segment if BOTH endpoint digits are present in the name
  let linesSvg = "";
  for (const line of LINES){
    const [a,b,c] = line.cells;
    const [ax,ay] = POSITIONS[a];
    const [bx,by] = POSITIONS[b];
    const [cx,cy] = POSITIONS[c];
    const weightAB = 1 + Math.min(counts[a] + counts[b], 8) * 0.5;
    const weightBC = 1 + Math.min(counts[b] + counts[c], 8) * 0.5;
    if (counts[a] > 0 && counts[b] > 0){
      linesSvg += svgLine(ax,ay,bx,by,line.color,weightAB);
    }
    if (counts[b] > 0 && counts[c] > 0){
      linesSvg += svgLine(bx,by,cx,cy,line.color,weightBC);
    }
  }

  // cells: active digits get a full circle + rings; absent digits fade to a bare number
  let cellsSvg = "";
  for (const [digitStr, pos] of Object.entries(POSITIONS)){
    const digit = parseInt(digitStr, 10);
    const [x, y] = pos;
    const count = counts[digit];

    if (count > 0){
      cellsSvg += svgRings(x, y, count);
      cellsSvg += `<circle cx="${x}" cy="${y}" r="13" fill="var(--bg)" stroke="var(--amber)" stroke-width="1.5"/>`;
      cellsSvg += `<text x="${x}" y="${y+5}" text-anchor="middle" class="cell-digit">${digit}</text>`;
      cellsSvg += `<text x="${x}" y="${y+26}" text-anchor="middle" class="cell-count">x${count}</text>`;
    } else {
      cellsSvg += `<text x="${x}" y="${y+5}" text-anchor="middle" fill="var(--amber-faint)" font-size="16" opacity="0.5">${digit}</text>`;
    }
  }

  document.getElementById("gridSvg").innerHTML = linesSvg + cellsSvg;

  // table
  const table = document.getElementById("groupTable");
  table.innerHTML = GROUPS.map(([label, digit]) =>
    `<tr><td class="group">${digit} &ndash; ${label}</td><td class="count">${counts[digit]}</td></tr>`
  ).join("");

  // status
  const gaps = [];
  for (let d = 1; d <= 9; d++){
    if (counts[d] === 0) gaps.push(d);
  }
  const statusBox = document.getElementById("statusBox");
  if (gaps.length === 0){
    statusBox.className = "status complete";
    statusBox.textContent = "Complete: every digit 1-9 is represented.";
  } else {
    statusBox.className = "status gaps";
    statusBox.innerHTML = `Missing digits: <span class="gap-list">${gaps.join(", ")}</span>`;
  }
}

document.getElementById("processBtn").addEventListener("click", () => {
  render(document.getElementById("nameInput").value);
});
document.getElementById("nameInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") render(e.target.value);
});
document.getElementById("clearBtn").addEventListener("click", () => {
  const input = document.getElementById("nameInput");
  input.value = "";
  input.focus();
  render("");
});

// starts on an empty grid, ready for any name
render("");
</script>
</body>
</html>
